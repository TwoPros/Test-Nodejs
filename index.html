<!DOCTYPE html>
<html>
<head>
    <title>Connect Frontend & Backend</title>
</head>
<body>

<h1 id="text">Loading...</h1>

<script>
    fetch("/api/index.js")
        .then(res => res.json())
        .then(data => {
            document.getElementById("text").innerText = data.message;
        })
        .catch(err => {
            console.log(err);
        });
</script>

</body>
</html>
